version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_vps
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Root@123456789
      MYSQL_DATABASE: webgreenspace
      MYSQL_USER: webuser
      MYSQL_PASSWORD: WebUser@123456789
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: